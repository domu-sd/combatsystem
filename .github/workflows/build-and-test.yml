name: build-and-test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install g++
        run: sudo apt-get install -y g++

      - name: Build and run tests
        run: make tests

  release:
    runs-on: ubuntu-latest

    needs: build-and-test
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install g++
        run: sudo apt-get install -y g++

      - name: Build game
        run: make game

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          files: game
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

